<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>MiniBrowse UI</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 2rem; }
    input, button { font-size: 1rem; padding: .5rem .75rem; }
    pre { background:#111; color:#0f0; padding:1rem; overflow:auto; }
  </style>
</head>
<body>
  <h1>MiniBrowse UI</h1>
  <p>Enter document name:</p>
  <input id="docName" placeholder="e.g., Alice" />
  <button id="go">Fetch</button>

  <h2>Results</h2>
  <pre id="out">—</pre>

  <script>
    const url = "YOUR_WEBHOOK_URL";  // n8n production Webhook URL
    const out = document.getElementById("out");

    document.getElementById("go").onclick = async () => {
      out.textContent = "Loading...";
      const docName = document.getElementById("docName").value || "";
      try {
        const res = await fetch(url, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ docName })
        });
        const data = await res.json();
        out.textContent = JSON.stringify(data, null, 2);
      } catch (e) {
        out.textContent = "Error: " + e.message;
      }
    };
  </script>
</body>
</html>
